name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    defaults:
      run:
        working-directory: packages/mnema-python

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Create venv
        run: uv venv --python ${{ matrix.python-version }} .venv

      - name: Install package (all backends + dev)
        run: VIRTUAL_ENV=.venv uv pip install -e '.[all,dev]'

      - name: Lint (ruff)
        run: .venv/bin/ruff check src/ tests/

      # Type-checking is informational. mypy strict mode still has ~90 errors
      # to clean up; we don't want to block PRs on it yet. Re-enable as a
      # required check once the codebase is fully annotated.
      - name: Type-check (mypy, informational)
        run: .venv/bin/mypy src/mnema || true

      - name: Run tests
        run: .venv/bin/pytest -v --cov=mnema --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: packages/mnema-python/.coverage
