name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # for trusted publishing (OIDC)
      contents: write  # to create the GitHub Release

    defaults:
      run:
        working-directory: packages/mnema-python

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Configure trusted publishing at https://pypi.org/manage/project/mnema-mcp/settings/publishing/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            packages/mnema-python/dist/*.whl
            packages/mnema-python/dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
