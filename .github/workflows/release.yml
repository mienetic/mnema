name: Release

# Create a GitHub Release (with auto-generated notes) when a `v*` tag is pushed.
#
# Mnema is NOT published to PyPI — installation is via the one-line installer
# (git + uv). This workflow just cuts a release so users get nice release notes
# and `mnema-update` users have tags to pull.

on:
  push:
    tags: ["v*"]

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## Install / update

            ```bash
            # First-time install
            curl -fsSL https://raw.githubusercontent.com/mienetic/mnema/main/scripts/install.sh | bash

            # Update an existing install
            mnema-update
            ```

            See the [full changelog](https://github.com/mienetic/mnema/blob/main/CHANGELOG.md).
