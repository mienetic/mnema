name: Node CI

# Runs the browser extension's unit tests (node:test via npm test) on every
# push/PR that touches packages/mnema-extension/. Keeps the extension's pure
# logic layer (api.js, storage.js) green across Node versions.

on:
  push:
    branches: [main]
    paths:
      - "packages/mnema-extension/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/mnema-extension/**"

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22.x", "24.x"]

    defaults:
      run:
        working-directory: packages/mnema-extension

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Run tests
        run: npm test
